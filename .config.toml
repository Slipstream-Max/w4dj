# One file, one directory, or any mixture of both.
# Windows: use literal strings for backslashes, for example
# 'C:\Users\name\Music', '\\server\share\Music', or '\\?\C:\very long path'.
# Double-quoted escaped strings such as "C:\\Users\\name\\Music" also work.
# Linux: "/home/name/Music". macOS: "/Users/name/Music".
inputs = [
    'D:\CloudMusic',
]

# Optional. When omitted, w4dj uses the w4djdump directory next to the executable.
# output = 'D:\Music\w4djdump'

mode = "original"
