# W4DJ release workflow
#
# Builds native binaries for macOS and Windows on Intel/AMD64 and ARM64.

name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Existing tag to release (for example, v0.9)"
        required: true
        default: "v0.9"
        type: string

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  build:
    name: ${{ matrix.description }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-15-intel
            archive: tar.gz
            binary: w4dj
            description: macOS x86_64

          - target: aarch64-apple-darwin
            os: macos-15
            archive: tar.gz
            binary: w4dj
            description: macOS ARM64

          - target: x86_64-pc-windows-msvc
            os: windows-2025
            msvc_arch: x64
            archive: zip
            binary: w4dj.exe
            description: Windows x86_64

          - target: aarch64-pc-windows-msvc
            os: windows-11-arm
            msvc_arch: arm64
            archive: zip
            binary: w4dj.exe
            description: Windows ARM64

    steps:
      - name: Check out release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_type == 'tag' && github.ref || inputs.version }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Set up MSVC
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.msvc_arch }}

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ runner.arch }}-cargo-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-cargo-${{ matrix.target }}-

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Inspect artifact (macOS)
        if: runner.os == 'macOS'
        run: ls -lh target/${{ matrix.target }}/release/${{ matrix.binary }}

      - name: Inspect artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Get-Item target/${{ matrix.target }}/release/${{ matrix.binary }} | Format-List Name,Length,FullName

      - name: Package tar.gz
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          tar -C target/${{ matrix.target }}/release \
            -czf w4dj-${{ matrix.target }}.tar.gz \
            ${{ matrix.binary }}

      - name: Package zip
        if: matrix.archive == 'zip'
        shell: pwsh
        run: Compress-Archive -Path target/${{ matrix.target }}/release/${{ matrix.binary }} -DestinationPath w4dj-${{ matrix.target }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: w4dj-${{ matrix.target }}
          path: w4dj-${{ matrix.target }}.${{ matrix.archive }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: w4dj-*
          path: dist
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || inputs.version }}
          files: dist/*
          generate_release_notes: true

      - name: Write summary
        shell: bash
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<'EOF'
          ## Release artifacts

          | Platform | Architecture | File |
          |---|---|---|
          | macOS | x86_64 | `w4dj-x86_64-apple-darwin.tar.gz` |
          | macOS | ARM64 | `w4dj-aarch64-apple-darwin.tar.gz` |
          | Windows | x86_64 | `w4dj-x86_64-pc-windows-msvc.zip` |
          | Windows | ARM64 | `w4dj-aarch64-pc-windows-msvc.zip` |
          EOF
